<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Pages Test</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1a1a2e;
            color: #e0e0e0;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 40px 60px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 { color: #00d4aa; margin-bottom: 8px; }
        .timestamp { color: #888; font-size: 14px; margin-top: 16px; }
        .check { font-size: 48px; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="check">✅</div>
        <h1>GitHub Pages is working!</h1>
        <p>Michael's save_page tool successfully published this file.</p>
        <p class="timestamp">Published: Sunday, February 22, 2026 at 10:52 PM PST</p>
    </div>
</body>
</html>
